name: chocolatine

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: git@github.com:EpitechPGE1-2025/G-DOP-200-PAR-2-1-bschocolatine-52.git
  EXECUTABLES: "my_executable"

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    if: github.repository != env.MIRROR_SSH_URL
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run banana check
        run: banana-check-repo

      - name: Compile project
        timeout-minutes: 2
        run: make CC=epiclang

      - name: Check coding style errors
        run: |
          if [ -f banana_output.txt ]; then
            while IFS= read -r line; do
              file=$(echo "$line" | cut -d':' -f1)
              lineno=$(echo "$line" | cut -d':' -f2)
              msg=$(echo "$line" | cut -d':' -f3-)
              echo "::error file=$file,line=$lineno::$msg"
            done < banana_output.txt
          fi

      - name: Fail if coding style errors
        run: |
          if [ -f banana_output.txt ] && [ -s banana_output.txt ]; then
            exit 1
          fi

      - name: Clean project
        run: make clean

      - name: Check executables
        run: |
          IFS=',' read -ra EXECS <<< "$EXECUTABLES"
          for exec in "${EXECS[@]}"; do
            if [ ! -f "$exec" ]; then
              echo "::error::Missing executable: $exec"
              exit 1
            fi
            if [ ! -x "$exec" ]; then
              echo "::error::Not executable: $exec"
              exit 1
            fi
          done

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests
        timeout-minutes: 2
        run: make tests_run

  push_to_mirror:
    name: Push to mirror
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
